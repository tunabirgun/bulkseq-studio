# Core environment: the alignment/quantification command-line tools for all three
# aligner routes (STAR, HISAT2, Salmon) -> featureCounts/tximport -> DESeq2. The R /
# Bioconductor stack lives in bulkseq_full.yaml. conda-forge has priority over bioconda
# (channel added last wins); use with channel_priority strict. CLI tools pinned to the
# protocol versions.
# NOTE: keep the aligner tool set in sync with bulkseq_full.yaml, the pinned
# bulkseq.lock.yaml, the setup verification loop in scripts/setup_wsl_bioenv.sh, and the
# probe lists in app/core/readiness.py. List drift here is what broke the Salmon/HISAT2
# routes on core-only envs (gffread/salmon/hisat2 were added to full but not core).
name: bulkseq
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.12
  - snakemake-minimal
  - fastqc=0.12.1
  - multiqc=1.30
  - fastp=1.0.1
  - sortmerna=4.3.7
  - star=2.7.11b
  - hisat2=2.2.2
  - salmon=1.10.3
  - gffread=0.12.9
  - samtools=1.22.1
  - subread=2.1.1
  # Preprocessing alternatives (opt-in; fastp + SortMeRNA remain the defaults): the Trim Galore
  # and Trimmomatic trimmers, and the FastQ Screen contamination screen (needs bowtie2). The
  # RiboDetector rRNA filter pulls a CPU torch stack and lives in the full env only.
  - trim-galore
  - cutadapt
  - pigz
  - trimmomatic
  - fastq-screen
  - bowtie2
  # RSeQC extended alignment QC (opt-in) + the GTF->BED12 gene-model tools it needs.
  - rseqc
  - ucsc-gtftogenepred
  - ucsc-genepredtobed
  - pandas
  - pyyaml
