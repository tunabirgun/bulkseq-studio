# Full environment: core CLI tools plus the R / Bioconductor stack for DESeq2,
# functional enrichment, and figures. CLI tools are version-pinned to the
# protocol; R/Bioconductor packages float and the solved versions are recorded
# (sessionInfo + env export) as the lock. conda-forge has priority over bioconda.
name: bulkseq
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.12
  - snakemake-minimal
  - aria2
  - fastqc=0.12.1
  - multiqc=1.30
  - fastp=1.0.1
  - sortmerna=4.3.7
  - star=2.7.11b
  - hisat2=2.2.2
  - salmon=1.10.3
  - gffread=0.12.9
  - samtools=1.22.1
  - subread=2.1.1
  # Preprocessing alternatives (opt-in; fastp + SortMeRNA remain the defaults): the Trim Galore
  # and Trimmomatic trimmers, the FastQ Screen contamination screen (needs bowtie2), and the
  # RiboDetector reference-free rRNA filter (pulls a CPU torch stack).
  - trim-galore
  - cutadapt
  - pigz
  - trimmomatic
  - fastq-screen
  - bowtie2
  - ribodetector
  # RSeQC extended alignment QC (opt-in) + the GTF->BED12 gene-model tools it needs.
  - rseqc
  - ucsc-gtftogenepred
  - ucsc-genepredtobed
  - pandas
  - pyyaml
  # R / Bioconductor. r-base is pinned to the known-good 4.5.2: an env update that bumps
  # r-base (e.g. to 4.5.3) leaves the compiled R packages binary-incompatible and they fail
  # to load, so it must not float. The clusterprofiler floor blocks conda-forge's ancient
  # 3.x relic from ever being selected over the recent bioconda build.
  - r-base=4.5.2
  - bioconductor-deseq2
  - bioconductor-apeglm
  # ashr: the lfcShrink type used as the contrast fallback in run_deseq2.R (apeglm
  # shrinks coefficients only; ashr also shrinks arbitrary contrasts).
  - r-ashr
  - bioconductor-tximport
  - bioconductor-clusterprofiler>=4.14
  - bioconductor-enrichplot
  - bioconductor-fgsea
  # GSVA sample-level gene-set activity (optional, organism-safe on user gene sets).
  - bioconductor-gsva
  - bioconductor-biomart
  - bioconductor-complexheatmap
  - bioconductor-enhancedvolcano
  - bioconductor-org.dm.eg.db
  # Microarray / GEO support (0.4.0): GEOquery ingest + limma DE + Affy RMA;
  # human/mouse OrgDbs for symbol-based enrichment.
  - bioconductor-geoquery
  - bioconductor-limma
  # edgeR (limma companion): DGEList/filterByExpr/TMM for the optional limma-voom
  # differential-expression engine (run_voom.R).
  - bioconductor-edger
  - bioconductor-affy
  - bioconductor-biobase
  - bioconductor-org.hs.eg.db
  - bioconductor-org.mm.eg.db
  # OrgDbs for the other organism presets that enrichment.smk _ENRICH_MAP maps to a
  # native clusterProfiler GO route (enrichGO + gseGO + DOSE). Without these the run
  # silently falls back to g:Profiler (ORA only, no GO GSEA) for yeast/Arabidopsis/
  # worm/zebrafish.
  - bioconductor-org.sc.sgd.db
  - bioconductor-org.at.tair.db
  - bioconductor-org.ce.eg.db
  - bioconductor-org.dr.eg.db
  - r-ggplot2
  - r-ggrepel
  - r-ggridges
  - r-ggtext
  - r-pheatmap
  - r-rcolorbrewer
  - r-svglite
  - r-msigdbr
  # g:Profiler GO/KEGG/Reactome ORA + ID conversion for organisms without a
  # Bioconductor OrgDb (fungi, bacteria, yeast/worm/zebrafish/Arabidopsis) (0.7.0).
  - r-gprofiler2
  # PPI networks + graph handling (0.6.0): STRING interactions, igraph/ggraph,
  # cytoscape.js JSON export.
  - bioconductor-stringdb
  - r-igraph
  - r-ggraph
  - r-tidygraph
  - r-jsonlite
