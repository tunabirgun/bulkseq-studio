        base_count: 2664041604
        fastq_1_url: ftp.sra.ebi.ac.uk/vol1/fastq/SRR116/004/SRR11684204/SRR11684204_1.fastq.gz
        fastq_2_url: ftp.sra.ebi.ac.uk/vol1/fastq/SRR116/004/SRR11684204/SRR11684204_2.fastq.gz
      - sample_id: ume6_delta_1
