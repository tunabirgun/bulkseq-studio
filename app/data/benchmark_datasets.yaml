benchmarks:
  - id: pasilla_paired_subset
    name: Pasilla paired-end subset
    organism_name: Drosophila melanogaster
    reference_preset: Drosophila melanogaster
    genome_size_category: custom
    contrast:
      name: cg8144_rnai_vs_untreated
      factor: condition
      numerator: cg8144_rnai
      denominator: untreated
      reference_level: untreated
    reference:
      source: Ensembl
      release: "111"
      assembly: BDGP6.46
      annotation_format: gtf
      genome_fasta_url: https://ftp.ensembl.org/pub/release-111/fasta/drosophila_melanogaster/dna/Drosophila_melanogaster.BDGP6.46.dna.toplevel.fa.gz
      annotation_gtf_url: https://ftp.ensembl.org/pub/release-111/gtf/drosophila_melanogaster/Drosophila_melanogaster.BDGP6.46.111.gtf.gz
    source_publication: Brooks et al. Genome Research 2011
    geo_series: GSE18508
    bioconductor_package: pasilla
    description: >
      Four-sample paired-end subset of the pasilla RNAi RNA-seq experiment.
      One ENA/SRA run is selected from each GEO biological sample to keep the
      benchmark practical while preserving two untreated and two CG8144 RNAi
      biological samples.
    notes:
      - The original GEO samples often contain more than one SRA run. This subset uses one run per biological sample for a quick validation benchmark.
      - Use allow_pending_sra validation until FASTQ files are downloaded.
      - For full biological reanalysis, include all lanes/runs and merge technical runs by sample before DESeq2.
    samples:
      - sample_id: untreated_3
        condition: untreated
        replicate: 1
        batch: pasilla
        layout: paired
        original_accession: SRR031714
        geo_accession: GSM461177
        experiment_accession: SRX014459
        read_count: 5327425
        base_count: 394229450
        fastq_1_url: ftp.sra.ebi.ac.uk/vol1/fastq/SRR031/SRR031714/SRR031714_1.fastq.gz
        fastq_2_url: ftp.sra.ebi.ac.uk/vol1/fastq/SRR031/SRR031714/SRR031714_2.fastq.gz
      - sample_id: untreated_4
        condition: untreated
        replicate: 2
        batch: pasilla
        layout: paired
        original_accession: SRR031716
        geo_accession: GSM461178
        experiment_accession: SRX014460
        read_count: 5921707
        base_count: 438206318
        fastq_1_url: ftp.sra.ebi.ac.uk/vol1/fastq/SRR031/SRR031716/SRR031716_1.fastq.gz
        fastq_2_url: ftp.sra.ebi.ac.uk/vol1/fastq/SRR031/SRR031716/SRR031716_2.fastq.gz
      - sample_id: cg8144_rnai_3
        condition: cg8144_rnai
        replicate: 1
        batch: pasilla
        layout: paired
        original_accession: SRR031724
        geo_accession: GSM461180
        experiment_accession: SRX014462
        read_count: 5962418
        base_count: 441218932
        fastq_1_url: ftp.sra.ebi.ac.uk/vol1/fastq/SRR031/SRR031724/SRR031724_1.fastq.gz
        fastq_2_url: ftp.sra.ebi.ac.uk/vol1/fastq/SRR031/SRR031724/SRR031724_2.fastq.gz
      - sample_id: cg8144_rnai_4
        condition: cg8144_rnai
        replicate: 2
        batch: pasilla
        layout: paired
        original_accession: SRR031726
        geo_accession: GSM461181
        experiment_accession: SRX014463
