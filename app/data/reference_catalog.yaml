    strain: GRCh38
    taxon_id: 9606
    source: Ensembl
    assembly_accession: GCA_000001405
    orgdb: org.Hs.eg.db
    enrichment_keytype: ENSEMBL
    kegg_organism: hsa
    string_taxon: 9606
    gprofiler_organism: hsapiens
    assembly_name: GRCh38
    annotation_source: Ensembl
    genome_fasta_url: https://ftp.ensembl.org/pub/release-111/fasta/homo_sapiens/dna/Homo_sapiens.GRCh38.dna.primary_assembly.fa.gz
