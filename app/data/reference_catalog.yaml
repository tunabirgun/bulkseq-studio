# Curated reference catalog. URLs are verified against the live Ensembl /
# NCBI RefSeq FTP listings. Vertebrate/fly/worm/yeast models use Ensembl
# release-111; fungi, plants and bacteria use NCBI RefSeq (uniform, stable,
# always ships a GTF). The pipeline downloads genome_fasta_url + annotation_gtf_url
# and builds the STAR index automatically when a preset is selected.
references:
