project:
  name: example_project
  working_directory: example_project
  created_at: "2026-06-19"
  app_version: 0.1.0
  workflow_version: 0.1.0
input:
  type: fastq
  layout: unknown
  samples: config/samples.tsv
  sra_accessions: config/sra_accessions.txt
microarray:
  # Only used when input.type == microarray (GEO/GSE). limma replaces DESeq2.
  gse_accession: null
  platform: null
  source: geo_series_matrix   # or affy_cel (RMA from raw CEL)
  normalization: auto         # auto | rma | none
  log2_transform: auto        # auto | yes | no
reference:
  mode: unset
  organism_name: unset
  strain: null
  package_id: null
  source: null
  release: null
  genome_fasta: null
  annotation_file: null
  annotation_format: unset
  genome_fasta_url: null
  annotation_gtf_url: null
  transcriptome_fasta: null
  protein_fasta: null
  star_index: null
  hisat2_index: null
  salmon_index: null
  genome_md5: null
  annotation_md5: null
  genome_size_category: custom
workflow:
  fastqc_pre_trim: true
  trimming: true
  # Trimmer: fastp (default) | trim-galore | trimmomatic.
  trimmer: fastp
  fastqc_post_trim: true
  rrna_filtering: false
  # rRNA filtering tool: sortmerna (default) | ribodetector (reference-free).
  rrna_tool: sortmerna
  # Contamination screening (FastQ Screen), a QC report, not a filter. Off by default.
  contamination_screen: false
  aligner: STAR
  quantifier: featureCounts
  enrichment: true
  figures: true
  # GSVA sample-level pathway activity (organism-safe; needs a custom GMT). Off by default.
  gsva: false
  # RSeQC extended alignment QC (genome-BAM routes only). Off by default.
  rseqc: false
  # Differential-expression engine (count-based routes): DESeq2 | limma-voom.
  # DESeq2 is the default; limma-voom is an opt-in cross-check.
  de_engine: DESeq2
  custom_gene_list_analysis: true
  # Mitochondrial + chloroplast genes: keep | discard | separate (default keep).
  organellar_genes: keep
fastp:
  detect_adapter_for_pe: true
  qualified_quality_phred: 15
  unqualified_percent_limit: 40
  length_required: 36
  trim_poly_g: false
  trim_poly_x: false
trimmomatic:
  sliding_window_size: 4
  sliding_window_quality: 15
  leading: 3
  trailing: 3
ribodetector:
  chunk_size: 256
  ensure: norrna
contamination:
  subset: 100000
sortmerna:
  paired_mode: paired_in
  database: null
star:
  twopass_mode: false
  # Read filters default to STAR's own defaults; raise for ENCODE long-RNA
  # (multimap_nmax: 20, mismatch_nover_read_lmax: 0.04).
  multimap_nmax: 10
  mismatch_nover_read_lmax: 1.0
  extra: ""
featurecounts:
  feature_type: exon
  attribute_type: gene_id
  # strandedness is auto-detected per run (STAR from ReadsPerGene, HISAT2 from a
  # featureCounts -s1/-s2 probe) and Salmon uses -l A, so this value is overwritten
  # and kept only as a fallback default.
  strandedness: 0
  count_read_pairs: true
deseq2:
  design_formula: "~ condition"
  reference_level:
    condition: control
  contrasts:
    - name: treated_vs_control
      factor: condition
      numerator: treated
      denominator: control
  alpha: 0.05
  lfc_threshold: 1.0
  min_count: 10
  lfc_shrinkage: true
  shrinkage_method: apeglm
gene_sets:
  custom_gene_list: null
  custom_gene_sets: null
  functional_annotation_table: null
  background_gene_list: null
enrichment:
  # Override the organism-derived enrichment DB/keytype/KEGG. Null => fall back to
  # the organism mapping in workflow/rules/enrichment.smk. Microarray sets keytype
  # to SYMBOL. Distinct from workflow.enrichment (the on/off toggle).
  orgdb: null
  keytype: null
  kegg_organism: null
  # backend: clusterprofiler keeps the auto OrgDb->gprofiler->none chain; set to
  # gprofiler to force the g:Profiler GO route. gprofiler_organism is the g:Profiler
  # id (e.g. hsapiens), distinct from the KEGG code; null falls back to the catalog.
  backend: clusterprofiler
  gprofiler_organism: null
ppi:
  # STRING PPI network. taxon is the curated STRING taxid (null => derived from the
  # organism); the rule degrades to empty outputs when STRING is unreachable or the
  # organism has no STRING taxid.
  enabled: true
  score_threshold: 400
  taxon: null
  seed_source: de
  string_version: "12.0"
  max_seed_genes: 400
  hub_label_count: 15
figures_style:
  palette: Blue-Red
  point_size: 2.5
  base_font_size: 12
  font_family: ""
  label_bold: false
  title_bold: false
  volcano_top_n: 15
  heatmap_top_n: 30
  pca_ntop: 500
  width_in: 6.0
  height_in: 5.0
  dpi: 300
  # Volcano de-squeeze + shared-style fields (W2). 0 = auto where noted.
  volcano_y_cap: 0.0
  volcano_y_cap_quantile: 0.995
  volcano_cap_headroom: 0.10
  volcano_neglogp_floor: 320.0
  volcano_point_scale: 0.55
  volcano_point_alpha: 0.55
  scatter_alpha_fg: 0.8
  scatter_alpha_bg: 0.25
  pca_fixed_aspect: false
  heatmap_zlim: 2.5
  heatmap_cell_height: 12.0
  heatmap_fontsize_row: 0
  heatmap_number_fontsize: 0
  heatmap_number_format: "%.2f"
  enrich_show_category: 15
  enrich_cnet_category: 5
  enrich_emap_category: 15
  enrich_label_wrap: 40
  gsea_line_color: ""
  ppi_layout: fr
  ppi_node_max_size: 11.0
  size_overrides: {}
  rasterize_points: false
resources:
  profile: balanced
  total_threads: 4
  total_memory_gb: 8
  temp_dir: tmp
  keep_intermediate: false
rule_threads:
  fasterq_dump: 4
  fastqc: 1
  fastp: 4
  sortmerna: 4
  star_index: 4
  star_align: 4
  hisat2_align: 4
  salmon_quant: 4
  featurecounts: 4
  deseq2: 2
  multiqc: 1
rule_memory_gb:
  fasterq_dump: 8
  fastqc: 1
  fastp: 4
  sortmerna: 12
  star_index: 24
  star_align: 24
  hisat2_align: 8
  salmon_quant: 8
  featurecounts: 8
  deseq2: 12
  multiqc: 2
