<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000" fill="none">
  <defs>
    <linearGradient id="barGrad1" x1="150" y1="0" x2="850" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B65B1"/>
      <stop offset="0.5" stop-color="#22D1C5"/>
      <stop offset="1" stop-color="#0B65B1"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#18B8C3"/>
      <stop offset="1" stop-color="#20D2C6"/>
